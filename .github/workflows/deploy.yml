# CSS 빌드 (PurgeCSS + 미니파이). 배포 단계는 환경에 맞게 추가.
name: Build / Deploy

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build CSS
        run: npm run build:css
        working-directory: .

      # 배포: FTP/SSH 등은 여기에 step 추가
      # - name: Deploy to server
      #   run: ...
